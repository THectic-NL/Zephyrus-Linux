name: "Trivy filesystem scan"

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          format: table
